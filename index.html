<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мой мессенджер</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(45deg, #7E57C2, #AB47BC, #5C6BC0, #42A5F5);
            background-size: 400% 400%;
            animation: bg 10s ease infinite;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            text-align: center;
            padding: 20px;
        }

        @keyframes bg {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .card {
            background: rgba(0,0,0,0.3);
            padding: 50px 35px;
            border-radius: 25px;
            backdrop-filter: blur(10px);
            box-shadow: 0 0 40px rgba(0,0,0,0.3);
            max-width: 450px;
            border: 1px solid rgba(255,255,255,0.2);
        }

        h1 {
            font-size: 36px;
            margin-bottom: 15px;
            color: #fff;
        }

        .desc {
            font-size: 18px;
            margin-bottom: 40px;
            opacity: 0.9;
        }

        .button {
            display: inline-block;
            padding: 20px 45px;
            background: white;
            color: #7E57C2;
            font-size: 20px;
            font-weight: bold;
            border-radius: 100px;
            text-decoration: none;
            transition: 0.3s;
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
        }

        .button:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 30px rgba(0,0,0,0.3);
        }

        .anime-text {
            margin-top: 30px;
            font-size: 14px;
            opacity: 0.7;
        }
    </style>
</head>

<body>
    <div class="card">
        <h1>✨ Связь со мной</h1>
        <p class="desc">Нажми, чтобы написать в мессенджер</p>

        <!-- ТВОЯ ССЫЛКА НА МЕССЕНДЖЕР -->
        <a href="https://t.me/danilpolshin" class="button">Открыть чат</a>

        <div class="anime-text">
            Genshin • Miku • Anime • Style
        </div>
    </div>
</body>
</html>
